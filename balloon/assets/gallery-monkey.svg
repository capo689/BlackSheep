    <linearGradient id="vine" x1="0" x2="1"><stop offset="0" stop-color="#7cc84a"/><stop offset="1" stop-color="#237734"/></linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#4e2107" flood-opacity=".22"/></filter>
  </defs>
