<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" role="img" aria-labelledby="title desc">
  <title id="title">Purple balloon flower</title>
  <desc id="desc">FPO illustration of a purple balloon flower with green stem.</desc>
  <defs>
    <linearGradient id="petal" x1="0" x2="1"><stop offset="0" stop-color="#dca8ff"/><stop offset=".55" stop-color="#8e48c7"/><stop offset="1" stop-color="#512080"/></linearGradient>
    <linearGradient id="green" x1="0" x2="1"><stop offset="0" stop-color="#8ee36b"/><stop offset="1" stop-color="#1d9a47"/></linearGradient>
    <radialGradient id="bg" cx="32%" cy="20%" r="90%"><stop offset="0" stop-color="#fff5fc"/><stop offset="1" stop-color="#e4f8dc"/></radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%"><feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#33204d" flood-opacity=".24"/></filter>
  </defs>
  <rect width="900" height="720" fill="url(#bg)"/>
  <path d="M210 591c137-37 279-39 426-7 62 14 116 13 162 1" fill="none" stroke="#0b2254" stroke-width="5" stroke-linecap="round" stroke-dasharray="8 15" opacity=".32"/>
  <g filter="url(#shadow)" stroke-linecap="round" stroke-linejoin="round">
    <path d="M444 330C406 414 388 491 390 606" fill="none" stroke="#168c43" stroke-width="42"/>
    <ellipse cx="324" cy="492" rx="86" ry="31" transform="rotate(-23 324 492)" fill="url(#green)" stroke="#168c43" stroke-width="8"/>
    <ellipse cx="476" cy="477" rx="86" ry="31" transform="rotate(22 476 477)" fill="url(#green)" stroke="#168c43" stroke-width="8"/>
    <g transform="translate(444 275)" stroke="#5d238b" stroke-width="8">
      <ellipse cx="0" cy="-103" rx="47" ry="97" fill="url(#petal)"/>
      <ellipse cx="88" cy="-49" rx="47" ry="97" transform="rotate(58 88 -49)" fill="url(#petal)"/>
      <ellipse cx="88" cy="55" rx="47" ry="97" transform="rotate(118 88 55)" fill="url(#petal)"/>
      <ellipse cx="-88" cy="55" rx="47" ry="97" transform="rotate(-118 -88 55)" fill="url(#petal)"/>
      <ellipse cx="-88" cy="-49" rx="47" ry="97" transform="rotate(-58 -88 -49)" fill="url(#petal)"/>
